name: "❓ Question"
description: |
  Ask a question about usage or configuration.
labels:
  - question
body:
  - type: checkboxes
    attributes:
      label: Self Checks
      options:
        - label: |
            I have read the [FAQ](https://github.com/sacred-g/agent-switchboard#faq) section in README.
          required: true
        - label: |
            I have searched for [existing issues](https://github.com/sacred-g/agent-switchboard/issues), including closed ones.
          required: true

  - type: dropdown
    attributes:
      label: Related App
      description: |
        Which app is your question about?
      multiple: true
      options:
        - Claude Code
        - Codex
        - Gemini CLI
        - OpenCode
        - OpenClaw
        - General
    validations:
      required: true

  - type: textarea
    attributes:
      label: Your Question
      description: |
        Describe your question clearly.
    validations:
      required: true

  - type: textarea
    attributes:
      label: What Have You Tried
      description: |
        Describe what you've already tried or researched.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Environment
      description: |
        OS, Agent Switchboard version, and any relevant details.
      placeholder: "e.g. macOS 15.4, Agent Switchboard 3.11.1"
    validations:
      required: false
